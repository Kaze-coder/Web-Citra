<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Pelanggan - ISP Manager</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="wrapper d-flex">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-wifi"></i>
          <span>ISP Manager</span>
        </div>
      </div>

      <ul class="nav-menu">
        <li class="nav-item">
          <a href="../index.html" class="nav-link">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="pelanggan.html" class="nav-link active">
            <i class="fas fa-users"></i>
            <span>Data Pelanggan</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="perangkat.html" class="nav-link">
            <i class="fas fa-server"></i>
            <span>Data Perangkat</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="tagihan.html" class="nav-link">
            <i class="fas fa-file-invoice"></i>
            <span>Data Tagihan</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="peta.html" class="nav-link">
            <i class="fas fa-map-location-dot"></i>
            <span>Peta Lokasi</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Topbar -->
      <nav class="topbar">
        <div class="topbar-left">
          <button class="btn-toggle-sidebar" id="toggleSidebar">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="page-title">Data Pelanggan</h1>
        </div>
      </nav>

      <!-- Content -->
      <div class="content-area">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Daftar Pelanggan</h5>
            <div class="d-flex gap-2" style="flex-wrap: wrap; min-width: 0;">
              <input type="text" id="searchPelanggan" class="form-control" placeholder="Cari pelanggan..." style="min-width: 200px; flex: 1; max-width: 300px;">
              <button class="btn btn-primary" onclick="document.getElementById('tambahModal').style.display='flex';">
                <i class="fas fa-plus"></i> Tambah Pelanggan
              </button>
              <button class="btn btn-success" onclick="exportCSV();">
                <i class="fas fa-download"></i> Export CSV
              </button>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Nama</th>
                <th>No. Telepon</th>
                <th>Paket</th>
                <th>Harga Bulanan</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="pelangganTable">
              <tr><td colspan="6" class="text-center">Loading...</td></tr>
            </tbody>
          </table>

          <!-- Pagination -->
          <div style="padding: 20px; text-align: center;" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Tambah/Edit Pelanggan -->
  <div id="tambahModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Tambah Pelanggan</h5>
        <button type="button" class="btn-close" onclick="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form id="pelangganForm">
          <div class="mb-3">
            <label for="nama" class="form-label">Nama Pelanggan</label>
            <input type="text" class="form-control" id="nama" required>
          </div>
          <div class="mb-3">
            <label for="no_telepon" class="form-label">No. Telepon</label>
            <input type="text" class="form-control" id="no_telepon" required>
          </div>
          <div class="mb-3">
            <label for="paket_layanan" class="form-label">Paket Layanan</label>
            <input type="text" class="form-control" id="paket_layanan" placeholder="misal: 30 Mbps" required>
          </div>
          <div class="mb-3">
            <label for="harga_bulanan" class="form-label">Harga Bulanan (Rp)</label>
            <input type="number" class="form-control" id="harga_bulanan" required>
          </div>
          <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-control" id="status" required>
              <option value="Aktif">Aktif</option>
              <option value="Nonaktif">Nonaktif</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
        <button type="button" class="btn btn-primary" onclick="savePelanggan()" id="saveBtn">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Confirm Delete -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h5 class="modal-title">Konfirmasi Hapus</h5>
        <button type="button" class="btn-close" onclick="closeDeleteModal()"></button>
      </div>
      <div class="modal-body">
        <p>Apakah Anda yakin ingin menghapus pelanggan ini?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Batal</button>
        <button type="button" class="btn btn-danger" onclick="confirmDelete()" id="confirmDeleteBtn">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/pelanggan.js"></script>
</body>
</html>
